<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="robots" content="noindex">
<title>CHILLAXY 従業員メニュー</title>
<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
<script src="./config.js"></script>
<style>
  :root {
    --main: #091f42; --sub: #f9cfd1; --cta: #cc2055; --text: #242424;
    --border: #dddddd; --bg: #FAFAFA; --ok: #1a8f4c;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
    color: var(--text); background: var(--bg); font-size: 15px; line-height: 1.7;
    -webkit-font-smoothing: antialiased;
  }
  .screen { display: none; min-height: 100vh; padding-bottom: 40px; }
  .screen.active { display: block; }
  header.app {
    background: var(--main); color: #fff; padding: 16px 20px 14px;
    position: sticky; top: 0; z-index: 10; display: flex; align-items: center; gap: 10px;
  }
  header.app .back { background: none; border: none; color: var(--sub); font-size: 22px; line-height: 1; padding: 2px 8px 4px 0; cursor: pointer; }
  header.app .brandimg { height: 26px; display: block; }
  header.app .sub { font-size: 11px; opacity: .75; letter-spacing: .05em; margin-top: 3px; }
  .wrap { padding: 16px; max-width: 640px; margin: 0 auto; }
  .card { background: #fff; border-radius: 20px; margin-top: 14px; box-shadow: 1px 1px 3px 0 rgba(0,0,0,.12); padding: 16px; }
  .card h3 { color: var(--main); font-size: 15px; margin-bottom: 8px; }
  .muted { color: #777; font-size: 13px; }
  .menu-btn {
    display: flex; align-items: center; gap: 12px; width: 100%; text-align: left;
    background: #fff; border: none; border-radius: 20px; box-shadow: 1px 1px 3px 0 rgba(0,0,0,.12);
    padding: 16px; margin-top: 12px; cursor: pointer; font-size: 15.5px; color: var(--main); font-weight: 600;
  }
  .menu-btn:active { box-shadow: 0 4px 4px rgba(0,0,0,.15); }
  .menu-btn .ico { font-size: 22px; width: 30px; text-align: center; }
  .menu-btn .arw { margin-left: auto; color: var(--cta); }
  .menu-btn small { display: block; font-weight: 400; color: #888; font-size: 12px; margin-top: 2px; }
  .pill { display: block; width: 100%; border: none; cursor: pointer; background: var(--sub); color: var(--cta);
    font-size: 16px; font-weight: 700; letter-spacing: .05em; padding: 14px 20px; border-radius: 30px; margin-top: 16px; }
  .pill:active { background: var(--main); color: #fff; }
  .pill.primary { background: var(--cta); color: #fff; }
  .pill:disabled { opacity: .45; }
  select, input[type=time], input[type=date], input[type=text], input[type=number] {
    width: 100%; border: 1px solid var(--border); border-radius: 14px; padding: 9px 12px;
    font-size: 15px; background: #fff; color: var(--text); -webkit-appearance: none; appearance: none;
  }
  textarea { width: 100%; border: 1px solid var(--border); border-radius: 14px; padding: 9px 12px;
    font-size: 15px; background: #fff; color: var(--text); font-family: inherit; min-height: 62px; resize: vertical; }
  .field { margin-top: 12px; }
  .field > label { display: block; font-size: 12.5px; color: #666; margin-bottom: 4px; font-weight: 600; }
  .row2 { display: flex; gap: 8px; } .row2 > * { flex: 1; }
  .kpi { display: flex; gap: 10px; margin-top: 10px; font-size: 13px; color: #555; }
  .kpi b { color: var(--main); }
  .cash-list { list-style: none; margin-top: 6px; font-size: 13px; }
  .cash-list li { display: flex; gap: 8px; padding: 7px 2px; border-bottom: 1px solid #eee; align-items: baseline; }
  .cash-list li .cd { width: 40px; color: #999; flex: none; }
  .cash-list li .cn { flex: 1; } .cash-list li .ct { color: #888; font-size: 11px; }
  .cash-list li .cm { font-weight: 700; white-space: nowrap; }
  .cash-list li .in { color: var(--ok); } .cash-list li .out { color: var(--cta); }
  .badge { display: inline-block; background: var(--sub); color: var(--cta); font-size: 11px; font-weight: 700; padding: 2px 10px; border-radius: 20px; margin-left: 6px; }
  .today-shift { background: var(--main); color: #fff; border-radius: 20px; padding: 18px; margin-top: 14px; }
  .today-shift .big { font-size: 20px; font-weight: 700; margin: 4px 0; }
  .att-row { display: flex; gap: 10px; margin-top: 14px; }
  .att-row button { flex: 1; border: none; border-radius: 16px; padding: 13px 0; font-size: 15px; font-weight: 700; cursor: pointer; }
  .att-ok { background: var(--ok); color: #fff; }
  .att-late { background: #fff; color: var(--main); border: 1px solid var(--border) !important; }
  .att-done { background: rgba(255,255,255,.15); border-radius: 14px; padding: 10px 14px; margin-top: 12px; font-size: 14px; }
  .late-box { margin-top: 12px; display: none; }
  .late-box.show { display: block; }
  .shift-list { list-style: none; margin-top: 8px; }
  .shift-list li { display: flex; padding: 9px 4px; border-bottom: 1px solid #eee; font-size: 14px; align-items: center; }
  .shift-list li .d { width: 62px; font-weight: 600; }
  .shift-list li.sun .d { color: var(--cta); } .shift-list li.sat .d { color: #2f6fb0; }
  .shift-list li .body { flex: 1; }
  .shift-list li .k { font-size: 12px; color: #888; }
  .wish-day { display: flex; align-items: center; gap: 8px; padding: 8px 4px; border-bottom: 1px solid #eee; }
  .wish-day .d { width: 64px; font-size: 13.5px; font-weight: 600; }
  .wish-day.sun .d { color: var(--cta); } .wish-day.sat .d { color: #2f6fb0; }
  .wish-day select.wtype { flex: 0 0 96px; }
  .wish-day .times { display: flex; gap: 4px; flex: 1; }
  .wish-day .times.hidden { visibility: hidden; }
  .ym-row { display: flex; gap: 8px; margin-top: 4px; }
  .ym-row select { flex: 1; }
  .err { color: var(--cta); font-size: 13px; margin-top: 10px; white-space: pre-line; }
  .loading { position: fixed; inset: 0; background: rgba(9,31,66,.5); z-index: 99; display: none; align-items: center; justify-content: center; flex-direction: column; gap: 12px; }
  .loading.show { display: flex; }
  .spinner { width: 42px; height: 42px; border-radius: 50%; border: 4px solid var(--sub); border-top-color: transparent; animation: spin .8s linear infinite; }
  .loading p { color:#fff; font-size:13px; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); background: var(--main); color: #fff; padding: 12px 22px; border-radius: 30px; font-size: 14px; z-index: 100; opacity: 0; transition: opacity .3s; pointer-events: none; }
  .toast.show { opacity: 1; }
</style>
</head>
<body>

<!-- 画面0: 初回紐付け -->
<div class="screen" id="scr-bind">
  <header class="app"><div><img class="brandimg" src="../logo.webp" alt="CHILLAXY"><div class="sub">STAFF — 従業員メニュー</div></div></header>
  <div class="wrap">
    <div class="card">
      <h3>はじめての方へ</h3>
      <p class="muted">ご本人を確認するため、お名前を選んでください。次回からは自動で開きます。</p>
      <div style="margin-top:14px"><select id="bind-name"></select></div>
      <div class="err" id="bind-err"></div>
      <button class="pill primary" id="bind-btn" onclick="doBind()">この名前で始める</button>
    </div>
  </div>
</div>

<!-- 画面1: ホーム -->
<div class="screen" id="scr-home">
  <header class="app"><div><img class="brandimg" src="../logo.webp" alt="CHILLAXY"><div class="sub" id="home-sub">STAFF</div></div></header>
  <div class="wrap">
    <div id="today-area"></div>
    <button class="menu-btn" onclick="openShift()"><span class="ico">📅</span><span>シフトを確認する<small>確定シフト・勤怠を見る</small></span><span class="arw">›</span></button>
    <button class="menu-btn" onclick="openWish()"><span class="ico">✍️</span><span>希望シフトを提出する<small>出勤希望・休み希望を登録</small></span><span class="arw">›</span></button>
    <button class="menu-btn" onclick="openNippou()"><span class="ico">📝</span><span>日報<small>この画面で記入・提出（早番→遅番で追記）</small></span><span class="arw">›</span></button>
    <button class="menu-btn" onclick="openCash()"><span class="ico">💴</span><span>現金出納帳<small>この画面で明細を追加</small></span><span class="arw">›</span></button>
    <button class="menu-btn" onclick="openLink('weekly')"><span class="ico">🗓️</span><span>週次レポート<small>kintoneで記入・確認/編集</small></span><span class="arw">›</span></button>
    <button class="menu-btn" onclick="openLink('monthly')"><span class="ico">📊</span><span>月次レポート<small>kintoneで記入・確認/編集</small></span><span class="arw">›</span></button>
  </div>
</div>

<!-- 画面2: シフト確認 -->
<div class="screen" id="scr-shift">
  <header class="app"><button class="back" onclick="show('scr-home')">‹</button><div><img class="brandimg" src="../logo.webp" alt="CHILLAXY"><div class="sub">シフト確認</div></div></header>
  <div class="wrap">
    <div class="card">
      <div class="ym-row"><select id="shift-year"></select><select id="shift-month"></select></div>
    </div>
    <div class="card"><div id="shift-body"><p class="muted">読み込み中…</p></div></div>
  </div>
</div>

<!-- 画面3: 希望シフト提出 -->
<div class="screen" id="scr-wish">
  <header class="app"><button class="back" onclick="show('scr-home')">‹</button><div><img class="brandimg" src="../logo.webp" alt="CHILLAXY"><div class="sub">希望シフト提出</div></div></header>
  <div class="wrap">
    <div class="card">
      <div class="ym-row"><select id="wish-year"></select><select id="wish-month"></select></div>
      <p class="muted" style="margin-top:8px">各日の希望を選んでください。出勤は時刻も入力。空欄の日は提出されません。</p>
    </div>
    <div class="card"><div id="wish-body"><p class="muted">読み込み中…</p></div></div>
    <div class="err" id="wish-err"></div>
    <button class="pill primary" id="wish-submit" onclick="submitWish()">この内容で希望を提出する</button>
  </div>
</div>

<!-- 画面4: 日報（LIFF内入力） -->
<div class="screen" id="scr-nippou">
  <header class="app"><button class="back" onclick="show('scr-home')">‹</button><div><img class="brandimg" src="../logo.webp" alt="CHILLAXY"><div class="sub">日報</div></div></header>
  <div class="wrap">
    <div class="card">
      <h3>店舗を選択</h3>
      <div class="row2"><select id="np-store"></select><button class="pill" style="margin-top:0;flex:0 0 92px" onclick="loadNippou()">読込</button></div>
      <p class="muted" id="np-hint" style="margin-top:8px">店舗を選び「読込」を押すと、本日の日報を表示します。早番が作成し、遅番が同じ日報に追記して締めます。</p>
    </div>
    <div id="np-form" style="display:none">
      <div class="card">
        <div id="np-state" style="font-size:13px"></div>
        <button class="pill" style="margin-top:10px" onclick="fetchNippouAir()">📥 Airレジから売上を取込</button>
        <div class="field"><label>担当者名（早番）</label><input type="text" id="np-t1"></div>
        <div class="field"><label>担当者名（遅番）</label><input type="text" id="np-t2"></div>
        <div class="field"><label>担当者（その他）</label><input type="text" id="np-t3"></div>
        <div class="field"><label>天気</label><select id="np-weather"></select></div>
        <div class="row2">
          <div class="field"><label>売上目標(円)</label><input type="number" id="np-goal" inputmode="numeric"></div>
          <div class="field"><label>売上(円)</label><input type="number" id="np-sales" inputmode="numeric" oninput="npKpi()"></div>
        </div>
        <div class="field"><label>会計数(客数)</label><input type="number" id="np-count" inputmode="numeric" oninput="npKpi()"></div>
        <div class="kpi" id="np-kpi"></div>
      </div>
      <div class="card">
        <div class="field"><label>良かった接客</label><textarea id="np-good"></textarea></div>
        <div class="field"><label>悪かった接客 / 改善方法</label><textarea id="np-bad"></textarea></div>
        <div class="field"><label>お客様の声 / お客様情報</label><textarea id="np-voice"></textarea></div>
        <div class="field"><label>お店のためにしたこと</label><textarea id="np-did"></textarea></div>
        <div class="field"><label>在庫切れ</label><textarea id="np-stock"></textarea></div>
        <div class="field"><label>発注済・入荷予定</label><textarea id="np-order"></textarea></div>
        <div class="field"><label>その他共有事項</label><textarea id="np-other"></textarea></div>
      </div>
      <div class="err" id="np-err"></div>
      <button class="pill primary" id="np-save" onclick="saveNippou()">日報を保存する</button>
    </div>
  </div>
</div>

<!-- 画面5: 現金出納帳（LIFF内入力） -->
<div class="screen" id="scr-cash">
  <header class="app"><button class="back" onclick="show('scr-home')">‹</button><div><img class="brandimg" src="../logo.webp" alt="CHILLAXY"><div class="sub">現金出納帳</div></div></header>
  <div class="wrap">
    <div class="card">
      <h3>店舗を選択</h3>
      <div class="row2"><select id="cash-store"></select><button class="pill" style="margin-top:0;flex:0 0 92px" onclick="loadCash()">読込</button></div>
      <p class="muted" id="cash-hint" style="margin-top:8px">店舗を選び「読込」を押すと、当月の明細と入力欄を表示します。</p>
    </div>
    <div class="card" id="cash-listcard" style="display:none">
      <h3 id="cash-title">当月の明細</h3>
      <div id="cash-body"></div>
    </div>
    <div class="card" id="cash-form" style="display:none">
      <button class="pill" id="cash-air-btn" style="display:none;margin-top:0;margin-bottom:6px" onclick="fetchCashAir()">📥 Airレジから当日分を取込</button>
      <h3>明細を1行追加</h3>
      <div class="field"><label>日付</label><input type="date" id="c-date"></div>
      <div class="field"><label>内容</label><select id="c-naiyou"></select></div>
      <div class="field"><label>取引先 / 現金移動先</label><input type="text" id="c-torihiki" placeholder="例：セブンイレブン / 楽天銀行"></div>
      <div class="row2">
        <div class="field"><label>入金(円)</label><input type="number" id="c-in" inputmode="numeric"></div>
        <div class="field"><label>出金(円)</label><input type="number" id="c-out" inputmode="numeric"></div>
      </div>
      <div class="field"><label>担当者名</label><input type="text" id="c-tantou"></div>
      <div class="field"><label>メモ（任意）</label><input type="text" id="c-memo"></div>
      <div class="err" id="cash-err"></div>
      <button class="pill primary" id="cash-add" onclick="addCash()">この明細を追加する</button>
    </div>
  </div>
</div>

<div class="loading" id="loading"><div class="spinner"></div><p id="loading-msg">読み込み中…</p></div>
<div class="toast" id="toast"></div>

<script>
"use strict";
let liffReady = false, ME = null, TODAY = null;
const $ = (id) => document.getElementById(id);
const TIMES = (() => { const a = []; for (let h = 6; h <= 26; h++) { const hh = (h % 24); a.push(("0"+hh).slice(-2)+":00"); a.push(("0"+hh).slice(-2)+":30"); } return a; })();
const DOW = ["日","月","火","水","木","金","土"];

function show(id){ document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active")); $(id).classList.add("active"); window.scrollTo(0,0); }
function esc(s){ return String(s==null?"":s).replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c])); }
function loading(on,msg){ if(msg)$("loading-msg").textContent=msg; $("loading").classList.toggle("show",on); }
function toast(msg){ const t=$("toast"); t.textContent=msg; t.classList.add("show"); setTimeout(()=>t.classList.remove("show"),2200); }

// ---- 起動高速化: localStorageキャッシュ(stale-while-revalidate) ----
function todayStr(){ const n=new Date(); return `${n.getFullYear()}-${("0"+(n.getMonth()+1)).slice(-2)}-${("0"+n.getDate()).slice(-2)}`; }
function loadHomeCache(){
  try {
    const c = JSON.parse(localStorage.getItem("staff_home")||"null");
    if(!c || !c.staff) return null;
    if(c.date !== todayStr()) return { staff:c.staff, today:null }; // 別日: 名前は使うが当日データは破棄
    return c;
  } catch(e){ return null; }
}
function saveHomeCache(staff, today){
  try { localStorage.setItem("staff_home", JSON.stringify({ staff, today, date: todayStr() })); } catch(e){}
}
function clearHomeCache(){ try { localStorage.removeItem("staff_home"); } catch(e){} }

async function api(action, extra){
  const body = Object.assign({ action }, extra||{});
  if (liffReady) body.idToken = liff.getIDToken();
  const dk = new URLSearchParams(location.search);
  if (dk.get("debugUid")) { body.debugUid = dk.get("debugUid"); body.uidOverride = dk.get("uidOverride")||""; }
  const res = await fetch(window.CONFIG.GAS_URL, { method:"POST", headers:{"Content-Type":"text/plain;charset=utf-8"}, body: JSON.stringify(body) });
  return res.json();
}

function openLink(key){
  const url = window.CONFIG.KINTONE_LINK[key];
  if (liffReady && liff.openWindow) liff.openWindow({ url, external: true });
  else window.open(url, "_blank");
}
function fillOptions(sel, arr, ph){
  sel.innerHTML = (ph ? `<option value="">${esc(ph)}</option>` : "") + arr.map(v=>`<option value="${esc(v)}">${esc(v)}</option>`).join("");
}

// ---- 起動 ----
async function boot(){
  try {
    await liff.init({ liffId: window.CONFIG.LIFF_ID });
    if (!liff.isLoggedIn()) { liff.login({ redirectUri: location.href }); return; }
    liffReady = true;
  } catch(e){ console.warn("liff.init failed", e); }
  // キャッシュがあれば即ホーム描画（体感即時）。裏で home 1往復で再検証。
  const cache = loadHomeCache();
  if (cache && cache.staff){ ME = cache.staff; enterHome(cache.today); }
  let h;
  try { h = await api("home"); }
  catch(e){ if(!cache){ show("scr-bind"); $("bind-err").textContent = "通信エラー: "+(e.message||e); } return; }
  if (!h || !h.ok){ if(!cache){ show("scr-bind"); $("bind-err").textContent = (h&&h.error)||"エラー"; } return; }
  if (h.staff){ ME = h.staff; saveHomeCache(h.staff, h.today||null); enterHome(h.today||null); }
  else { clearHomeCache(); renderBind(h.candidates||[]); show("scr-bind"); }
}

function renderBind(cands){
  $("bind-name").innerHTML = '<option value="">お名前を選択</option>' + cands.map(c=>`<option value="${esc(c.id)}">${esc(c.name)}</option>`).join("");
}
async function doBind(){
  const staffId = $("bind-name").value;
  if(!staffId){ $("bind-err").textContent="お名前を選んでください"; return; }
  loading(true,"連携中…");
  try {
    const r = await api("bind", { staffId });
    if(!r.ok){ $("bind-err").textContent = r.error||"連携に失敗しました"; return; }
    ME = r.staff; enterHome();
  } catch(e){ $("bind-err").textContent = "通信エラー: "+(e.message||e); }
  finally { loading(false); }
}

function initYM(prefixY, prefixM, baseMonthOffset){
  const now = new Date();
  const y = $(prefixY), m = $(prefixM);
  const cy = now.getFullYear();
  y.innerHTML = [cy, cy+1].map(v=>`<option value="${v}">${v}年</option>`).join("");
  m.innerHTML = []; for(let i=1;i<=12;i++) m.innerHTML += `<option value="${i}">${i}月</option>`;
  let target = new Date(now.getFullYear(), now.getMonth()+ (baseMonthOffset||0), 1);
  y.value = target.getFullYear(); m.value = target.getMonth()+1;
}

function enterHome(today){
  $("home-sub").textContent = "STAFF — " + (ME.name||"");
  show("scr-home");
  renderToday(today);
}
function renderToday(t){
  TODAY = t || null;
  const area = $("today-area");
  if (!t || !t.ok || !t.shift){
    area.innerHTML = `<div class="card"><h3>今日のシフト</h3><p class="muted">本日の出勤予定はありません。</p></div>`;
    return;
  }
  const done = t.attendance && t.attendance.response;
  area.innerHTML = `<div class="today-shift">
    <div style="font-size:13px;opacity:.8">本日の出勤予定</div>
    <div class="big">${esc(t.shift.store)}　${esc(t.shift.start)}〜${esc(t.shift.end)}</div>
    <div id="att-zone"></div></div>`;
  const zone = $("att-zone");
  if (done){
    zone.innerHTML = `<div class="att-done">${done==="遅刻"?"🕐 遅刻で報告済み":"🟢 時間通りで報告済み"}</div>`;
  } else {
    zone.innerHTML = `<div class="att-row">
        <button class="att-ok" onclick="attend('時間通り',0)">🟢 時間通り</button>
        <button class="att-late" onclick="toggleLate()">🕐 遅刻</button>
      </div>
      <div class="late-box" id="late-box">
        <select id="late-min">${[5,10,15,20,30,45,60].map(n=>`<option value="${n}">${n}分ほど遅刻</option>`).join("")}</select>
        <button class="pill primary" style="margin-top:10px" onclick="attend('遅刻', parseInt($('late-min').value,10))">遅刻を報告する</button>
      </div>`;
  }
}
function toggleLate(){ $("late-box").classList.toggle("show"); }
async function attend(response, late){
  loading(true,"送信中…");
  try {
    const r = await api("attend", { response, lateMinutes: late });
    if(!r.ok){ toast(r.error||"送信に失敗しました"); return; }
    $("att-zone").innerHTML = `<div class="att-done">${response==="遅刻"?("🕐 遅刻("+late+"分)で報告しました"):"🟢 時間通りで報告しました"}</div>`;
    if (TODAY){ TODAY.attendance = { response: response, lateMinutes: late }; saveHomeCache(ME, TODAY); }
    toast("出勤確認を送信しました");
  } catch(e){ toast("通信エラー"); } finally { loading(false); }
}

async function openShift(){
  show("scr-shift"); initYM("shift-year","shift-month",0);
  $("shift-year").onchange = loadShift; $("shift-month").onchange = loadShift;
  loadShift();
}
async function loadShift(){
  $("shift-body").innerHTML = '<p class="muted">読み込み中…</p>';
  const r = await api("personal", { year: $("shift-year").value, month: $("shift-month").value });
  if(!r.ok){ $("shift-body").innerHTML = `<p class="err">${esc(r.error||"取得に失敗しました")}</p>`; return; }
  const rows = r.days.filter(d=>d.shifts.length || d.off);
  if(!rows.length){ $("shift-body").innerHTML = `<p class="muted">${r.month}月の確定シフトはまだありません。</p>`; return; }
  let html = `<h3>${r.year}年${r.month}月（出勤 ${r.workDays}日）</h3><ul class="shift-list">`;
  rows.forEach(d=>{
    const cls = d.dow===0?"sun":d.dow===6?"sat":"";
    const day = parseInt(d.date.split("-")[2],10);
    const body = d.shifts.length ? d.shifts.map(s=>`${esc(s.store)} ${esc(s.start)}〜${esc(s.end)}`).join("<br>") : '<span class="muted">公休</span>';
    html += `<li class="${cls}"><span class="d">${day}(${DOW[d.dow]})</span><span class="body">${body}${d.kintai?`<span class="k"> ${esc(d.kintai)}</span>`:""}</span></li>`;
  });
  html += "</ul>";
  $("shift-body").innerHTML = html;
}

// ---- 希望シフト提出 ----
let WISH_DAYS = [];
async function openWish(){
  show("scr-wish"); initYM("wish-year","wish-month",1);
  $("wish-year").onchange = loadWish; $("wish-month").onchange = loadWish;
  loadWish();
}
async function loadWish(){
  $("wish-body").innerHTML = '<p class="muted">読み込み中…</p>'; $("wish-err").textContent="";
  const y = parseInt($("wish-year").value,10), m = parseInt($("wish-month").value,10);
  const r = await api("wishlist", { year: y, month: m });
  if(!r.ok){ $("wish-body").innerHTML = `<p class="err">${esc(r.error||"取得に失敗しました")}</p>`; return; }
  const existing = {}; (r.wishes||[]).forEach(w=>existing[w.date]=w);
  const lastDay = new Date(y, m, 0).getDate();
  const timeOpts = TIMES.map(t=>`<option value="${t}">${t}</option>`).join("");
  let html = ""; WISH_DAYS = [];
  for(let day=1; day<=lastDay; day++){
    const date = `${y}-${("0"+m).slice(-2)}-${("0"+day).slice(-2)}`;
    const dow = new Date(y,m-1,day).getDay();
    const ex = existing[date];
    const wt = ex ? ex.wishType : "";
    const cls = dow===0?"sun":dow===6?"sat":"";
    html += `<div class="wish-day ${cls}" data-date="${date}">
      <span class="d">${day}(${DOW[dow]})</span>
      <select class="wtype" onchange="onWtype(this)">
        <option value="" ${wt===""?"selected":""}>—</option>
        <option value="出勤" ${wt==="出勤"?"selected":""}>出勤</option>
        <option value="休み希望" ${wt==="休み希望"?"selected":""}>休み希望</option>
      </select>
      <span class="times ${wt==="出勤"?"":"hidden"}">
        <select class="wstart">${timeOpts}</select><select class="wend">${timeOpts}</select>
      </span></div>`;
    WISH_DAYS.push(date);
  }
  $("wish-body").innerHTML = html;
  // 既存時刻を反映
  (r.wishes||[]).forEach(w=>{
    if(w.wishType!=="出勤") return;
    const el = document.querySelector(`.wish-day[data-date="${w.date}"]`);
    if(!el) return;
    if(w.start) el.querySelector(".wstart").value = w.start;
    if(w.end) el.querySelector(".wend").value = w.end;
  });
}
function onWtype(sel){
  const times = sel.parentElement.querySelector(".times");
  times.classList.toggle("hidden", sel.value!=="出勤");
}
async function submitWish(){
  const entries = [];
  document.querySelectorAll(".wish-day").forEach(el=>{
    const wt = el.querySelector(".wtype").value;
    if(!wt) return;
    const e = { date: el.dataset.date, wishType: wt };
    if(wt==="出勤"){ e.start = el.querySelector(".wstart").value; e.end = el.querySelector(".wend").value; }
    entries.push(e);
  });
  if(!entries.length){ $("wish-err").textContent="希望を1日以上選んでください"; return; }
  loading(true,"提出中…");
  try {
    const r = await api("wish", { entries });
    if(!r.ok){ $("wish-err").textContent = r.error||"提出に失敗しました"; return; }
    toast(`${r.count}日分の希望を提出しました`);
    setTimeout(()=>show("scr-home"), 1200);
  } catch(e){ $("wish-err").textContent = "通信エラー: "+(e.message||e); }
  finally { loading(false); }
}

// ---- 日報（LIFF内入力） ----
let NP_STATE = { exists: false };
function npKpi(){
  const sales = parseFloat($("np-sales").value)||0, cnt = parseFloat($("np-count").value)||0, goal = parseFloat($("np-goal").value)||0;
  const tanka = cnt ? Math.round(sales/cnt) : 0;
  const rate = goal ? Math.round(sales/goal*100) : 0;
  $("np-kpi").innerHTML = `客単価 <b>¥${tanka.toLocaleString()}</b>　目標達成率 <b>${rate}%</b>`;
}
function openNippou(){
  show("scr-nippou");

  $("np-form").style.display = "none";

// ---- 現金出納帳（LIFF内入力） ----
function openCash(){
  show("scr-cash");
  fillOptions($("cash-store"), window.CONFIG.CASH_STORES, "店舗を選択");
  fillOptions($("c-naiyou"), window.CONFIG.CASH_NAIYOU, "選択してください");
  $("cash-store").value = "";
  $("cash-listcard").style.display = "none";
  $("cash-form").style.display = "none";
  $("cash-hint").style.display = "block";
  $("cash-hint").textContent = "店舗を選び「読込」を押すと、当月の明細と入力欄を表示します。";
  const now = new Date();
  $("c-date").value = `${now.getFullYear()}-${("0"+(now.getMonth()+1)).slice(-2)}-${("0"+now.getDate()).slice(-2)}`;
}
async function loadCash(){
  const store = $("cash-store").value;
  if(!store){ $("cash-hint").textContent = "店舗を選んでください。"; return; }
  loading(true,"現金出納帳を読み込み中…");
  try {
    const r = await api("cash_get", { store });
    if(!r.ok){ $("cash-hint").textContent = r.error||"取得に失敗しました"; return; }
    if(!r.exists){
      $("cash-hint").style.display = "block";
      $("cash-hint").textContent = r.error || "当月のレコードがまだ作成されていません。バックオフィスにご連絡ください。";
      $("cash-listcard").style.display = "none"; $("cash-form").style.display = "none";
      return;
    }
    CASH_ROWS = r.rows || [];
    renderCashRows(CASH_ROWS);
    $("cash-title").textContent = `${store} 当月の明細（${CASH_ROWS.length}件）`;
    $("cash-hint").style.display = "none";
    $("cash-listcard").style.display = "block";
    $("cash-form").style.display = "block";
    $("c-tantou").value = ME.name || "";
    $("cash-air-btn").style.display = (window.CONFIG.CASH_AIRREGI_STORES||[]).indexOf(store) >= 0 ? "block" : "none";
  } catch(e){ $("cash-hint").textContent = "通信エラー: "+(e.message||e); }
  finally { loading(false); }
}
let CASH_ROWS = [];
function renderCashRows(rows){
  if(!rows.length){ $("cash-body").innerHTML = '<p class="muted">まだ明細はありません。</p>'; return; }
  const last = rows.slice(-12).reverse();
  let html = '<ul class="cash-list">' + last.map(r=>{
    const d = (r.日付||"").slice(5);
    const amt = (r.入金!=="" && r.入金!=null) ? `<span class="cm in">+¥${Number(r.入金).toLocaleString()}</span>`
              : ((r.出金!=="" && r.出金!=null) ? `<span class="cm out">-¥${Number(r.出金).toLocaleString()}</span>` : "");
    return `<li><span class="cd">${esc(d)}</span><span class="cn">${esc(r.内容)}<span class="ct"> ${esc(r.取引先||"")}</span></span>${amt}</li>`;
  }).join("") + '</ul>';
  if(rows.length>12) html += `<p class="muted" style="margin-top:6px">最新12件を表示（全${rows.length}件）</p>`;
  $("cash-body").innerHTML = html;
}
async function addCash(){
  const store = $("cash-store").value;
  if(!store) return;
  const row = {
    日付: $("c-date").value, 内容: $("c-naiyou").value, 取引先: $("c-torihiki").value.trim(),
    入金: $("c-in").value, 出金: $("c-out").value, 担当者名: $("c-tantou").value.trim(), 従業員メモ: $("c-memo").value.trim()
  };
  $("cash-err").textContent = "";
  if(!row.内容){ $("cash-err").textContent = "内容を選択してください"; return; }
  if(!row.取引先){ $("cash-err").textContent = "取引先を入力してください"; return; }
  if(!row.入金 && !row.出金){ $("cash-err").textContent = "入金または出金を入力してください"; return; }
  loading(true,"明細を追加中…");
  try {
    const r = await api("cash_add", { store, row });
    if(!r.ok){ $("cash-err").textContent = r.error||"追加に失敗しました"; return; }
    toast("明細を追加しました");
    $("c-torihiki").value=""; $("c-in").value=""; $("c-out").value=""; $("c-memo").value="";
    await loadCash();
  } catch(e){ $("cash-err").textContent = "通信エラー: "+(e.message||e); }
  finally { loading(false); }
}

// ---- Airレジ取込 ----
async function fetchNippouAir(){
  const store = $("np-store").value;
  if(!store){ $("np-err").textContent = "店舗を選んでください"; return; }
  $("np-err").textContent = "";
  loading(true,"Airレジから取得中…（1〜2分かかります）");
  try {
    const r = await api("airregi_daily", { store });
    if(!r.ok){ $("np-err").textContent = r.error||"取得に失敗しました"; return; }
    const v = r.values || {};
    if(v["売上目標"] !== "" && v["売上目標"] != null) $("np-goal").value = v["売上目標"];
    if(v["売上"] !== "" && v["売上"] != null) $("np-sales").value = v["売上"];
    if(v["会計数"] !== "" && v["会計数"] != null) $("np-count").value = v["会計数"];
    npKpi();
    toast(r.warning ? "売上を取込みました（当日は見込み値）" : "Airレジから売上を取込みました");
  } catch(e){ $("np-err").textContent = "通信エラー: "+(e.message||e); }
  finally { loading(false); }
}

async function fetchCashAir(){
  const store = $("cash-store").value;
  if(!store) return;
  $("cash-err").textContent = "";
  loading(true,"Airレジから取得中…（1〜2分かかります）");
  let rows;
  try {
    const r = await api("airregi_cash", { store });
    if(!r.ok){ $("cash-err").textContent = r.error||"取得に失敗しました"; loading(false); return; }
    rows = r.rows || [];
  } catch(e){ $("cash-err").textContent = "通信エラー: "+(e.message||e); loading(false); return; }
  loading(false);
  if(!rows.length){ toast("Airレジ側に当日の対象取引がありませんでした"); return; }
  // 簡易重複除外: 当月明細と 日付+内容+入金+出金 が一致する行はスキップ
  const key = r => `${r.日付}|${r.内容}|${r.入金}|${r.出金}`;
  const have = new Set(CASH_ROWS.map(key));
  const fresh = rows.filter(r => !have.has(key(r)));
  if(!fresh.length){ toast("取得した" + rows.length + "件はすべて取込済みです"); return; }
  const skipped = rows.length - fresh.length;
  if(!confirm("Airレジから" + fresh.length + "件を現金出納帳に追加します。よろしいですか？" + (skipped ? ("\n（既存" + skipped + "件はスキップ）") : ""))) return;
  loading(true,"追加中…");
  let added = 0;
  try {
    for(const row of fresh){
      const rr = await api("cash_add", { store, row });
      if(rr.ok) added++;
    }
    toast(added + "件を追加しました");
    await loadCash();
  } catch(e){ $("cash-err").textContent = "追加中にエラー: "+(e.message||e); }
  finally { loading(false); }
}
