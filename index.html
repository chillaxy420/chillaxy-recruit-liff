<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="robots" content="noindex">
<title>CHILLAXY 採用応募</title>
<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
<script src="./config.js"></script>
<style>
  :root {
    --main: #091f42;
    --sub: #f9cfd1;
    --cta: #cc2055;
    --text: #242424;
    --border: #dddddd;
    --bg: #FAFAFA;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
    color: var(--text); background: var(--bg);
    font-size: 15px; line-height: 1.7;
    -webkit-font-smoothing: antialiased;
  }
  .screen { display: none; min-height: 100vh; padding-bottom: 40px; }
  .screen.active { display: block; }

  header.app {
    background: var(--main); color: #fff;
    padding: 18px 20px 16px; position: sticky; top: 0; z-index: 10;
    display: flex; align-items: center; gap: 10px;
  }
  header.app .back {
    background: none; border: none; color: var(--sub);
    font-size: 22px; line-height: 1; padding: 2px 8px 4px 0; cursor: pointer;
  }
  header.app .brandimg { height: 30px; display: block; }
  header.app .sub { font-size: 11px; opacity: .75; letter-spacing: 0.05em; margin-top: 3px; }

  .conditions {
    background: #fff; border-radius: 20px; margin-top: 14px;
    box-shadow: 1px 1px 3px 0 rgba(0,0,0,.12); padding: 14px 16px;
    border-top: 3px solid var(--sub);
  }
  .conditions h4 {
    color: var(--main); font-size: 13.5px; letter-spacing: .06em; margin-bottom: 8px;
  }
  .conditions ul { list-style: none; }
  .conditions li {
    font-size: 12.5px; padding: 3px 0 3px 20px; position: relative;
  }
  .conditions li::before {
    content: "✓"; position: absolute; left: 2px; color: var(--cta); font-weight: 700;
  }

  .wrap { padding: 16px; max-width: 640px; margin: 0 auto; }

  .hero {
    background: var(--main); color: #fff;
    padding: 6px 20px 22px; border-radius: 0 0 20px 20px;
  }
  .hero p { font-size: 13.5px; opacity: .92; }

  .company {
    margin: 14px 0 4px; background: #fff; border-radius: 20px;
    box-shadow: 1px 1px 3px 0 rgba(0,0,0,.12); overflow: hidden;
  }
  .company summary {
    padding: 12px 16px; font-size: 13px; font-weight: 600; color: var(--main);
    cursor: pointer; list-style: none; display: flex; justify-content: space-between; align-items: center;
  }
  .company summary::after { content: "＋"; color: var(--cta); font-weight: 400; }
  .company[open] summary::after { content: "－"; }
  .company .body { padding: 0 16px 14px; font-size: 13px; }
  .company .body dt { color: #666; font-size: 11.5px; margin-top: 8px; }
  .company .body dd { margin: 0; }

  .card {
    background: #fff; border-radius: 20px; margin-top: 14px;
    box-shadow: 1px 1px 3px 0 rgba(0,0,0,.12);
    padding: 16px; cursor: pointer;
    transition: box-shadow .15s;
  }
  .card:active { box-shadow: 0 4px 4px rgba(0,0,0,.15); }
  .card h3 { color: var(--main); font-size: 15.5px; margin-bottom: 6px; }
  .badges { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 8px; }
  .badge {
    font-size: 11px; padding: 2px 10px; border-radius: 4px;
    background: var(--sub); color: var(--main); font-weight: 600;
  }
  .badge.loc { background: #eef1f6; color: #445; font-weight: 400; }
  .card .meta { font-size: 12.5px; color: #555; white-space: pre-line; }
  .card .cta-hint { text-align: right; color: var(--cta); font-size: 12.5px; font-weight: 600; margin-top: 6px; }

  .section { background: #fff; border-radius: 20px; box-shadow: 1px 1px 3px 0 rgba(0,0,0,.12); padding: 16px; margin-top: 14px; }
  .section h4 {
    color: var(--main); font-size: 13px; letter-spacing: .06em;
    border-left: 3px solid var(--sub); padding-left: 8px; margin-bottom: 6px;
  }
  .section .txt { font-size: 13.5px; white-space: pre-line; }

  .pill {
    display: block; width: 100%; border: none; cursor: pointer;
    background: var(--sub); color: var(--cta);
    font-size: 16px; font-weight: 700; letter-spacing: .05em;
    padding: 14px 20px; border-radius: 30px; margin-top: 18px;
    transition: background .15s, color .15s;
  }
  .pill:active { background: var(--main); color: #fff; }
  .pill:disabled { opacity: .45; }
  .pill.primary { background: var(--cta); color: #fff; }

  .field { margin-top: 14px; }
  .field label { display: block; font-size: 13px; font-weight: 600; color: var(--main); margin-bottom: 4px; }
  .req { color: var(--cta); font-size: 11px; margin-left: 4px; }
  .field input[type=text], .field input[type=tel], .field input[type=email],
  .field input[type=date], .field input[type=time], .field input[type=number], .field textarea {
    width: 100%; border: 1px solid var(--border); border-radius: 25px;
    padding: 10px 16px; font-size: 15px; background: #fff; color: var(--text);
    -webkit-appearance: none; appearance: none;
  }
  .field textarea { border-radius: 20px; min-height: 84px; }
  .field input:focus, .field textarea:focus { outline: 2px solid var(--sub); border-color: var(--sub); }
  .dt-row { display: flex; gap: 8px; }
  .dt-row input[type=date] { flex: 1.4; }
  .dt-row input[type=time] { flex: 1; }
  .radio-row { display: flex; flex-wrap: wrap; gap: 8px; }
  .radio-row label {
    border: 1px solid var(--border); border-radius: 30px; padding: 8px 16px;
    font-size: 13.5px; font-weight: 400; color: var(--text); cursor: pointer; background: #fff;
  }
  .radio-row input { display: none; }
  .radio-row label.on { background: var(--main); color: #fff; border-color: var(--main); font-weight: 600; }

  .filebox {
    border: 1.5px dashed var(--border); border-radius: 20px; background: #fff;
    padding: 12px 16px; font-size: 13px; color: #666; cursor: pointer;
  }
  .filebox.has { border-color: var(--sub); color: var(--main); font-weight: 600; background: #fff8f8; }
  .filebox input { display: none; }

  .notice {
    background: #fff; border: 1.5px solid var(--sub); border-radius: 20px;
    padding: 14px 16px; font-size: 12.5px; margin-top: 18px;
  }
  .notice b { color: var(--cta); display: block; margin-bottom: 4px; font-size: 12.5px; }

  .err { color: var(--cta); font-size: 12.5px; margin-top: 10px; white-space: pre-line; }

  .done-wrap { text-align: center; padding: 70px 24px 0; }
  .done-mark {
    width: 74px; height: 74px; border-radius: 50%; background: var(--sub);
    color: var(--cta); font-size: 38px; line-height: 74px; margin: 0 auto 18px; font-weight: 700;
  }
  .done-wrap h2 { color: var(--main); font-size: 19px; margin-bottom: 10px; }
  .done-wrap p { font-size: 13.5px; color: #555; }

  .loading {
    position: fixed; inset: 0; background: rgba(9,31,66,.55); z-index: 99;
    display: none; align-items: center; justify-content: center; flex-direction: column; gap: 14px;
  }
  .loading.show { display: flex; }
  .spinner {
    width: 44px; height: 44px; border-radius: 50%;
    border: 4px solid var(--sub); border-top-color: transparent;
    animation: spin .8s linear infinite;
  }
  .loading p { color: #fff; font-size: 13px; }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<!-- 画面1: 職種一覧 -->
<div class="screen active" id="scr-list">
  <header class="app">
    <div>
      <img class="brandimg" src="./logo.webp" alt="CHILLAXY">
      <div class="sub">RECRUIT — 採用応募</div>
    </div>
  </header>
  <div class="hero">
    <p id="intro"></p>
  </div>
  <div class="wrap">
    <div class="conditions" id="conditions"></div>
    <details class="company" id="company"></details>
    <div id="job-list"></div>
  </div>
</div>

<!-- 画面2: 職種詳細 -->
<div class="screen" id="scr-detail">
  <header class="app">
    <button class="back" onclick="show('scr-list')">‹</button>
    <div>
      <img class="brandimg" src="./logo.webp" alt="CHILLAXY">
      <div class="sub">募集要項</div>
    </div>
  </header>
  <div class="wrap" id="detail-body"></div>
</div>

<!-- 画面3: 応募フォーム -->
<div class="screen" id="scr-form">
  <header class="app">
    <button class="back" onclick="show('scr-detail')">‹</button>
    <div>
      <img class="brandimg" src="./logo.webp" alt="CHILLAXY">
      <div class="sub">応募フォーム</div>
    </div>
  </header>
  <div class="wrap">
    <div class="section">
      <h4 id="form-job-title"></h4>
      <div class="field">
        <label>氏名（フルネーム）<span class="req">必須</span></label>
        <input type="text" id="f-name" placeholder="例）山田 太郎" maxlength="50">
      </div>
      <div class="field">
        <label>電話番号<span class="req">必須</span></label>
        <input type="tel" id="f-tel" placeholder="例）090-1234-5678" maxlength="20">
      </div>
      <div class="field">
        <label>メールアドレス<span class="req">必須</span></label>
        <input type="email" id="f-email" placeholder="例）taro@example.com" maxlength="100">
      </div>
      <div class="field">
        <label>年齢<span class="req">必須</span></label>
        <input type="number" id="f-age" placeholder="例）27" min="15" max="99" style="max-width:140px">
      </div>
      <div class="field">
        <label>希望する雇用形態<span class="req">必須</span></label>
        <div class="radio-row" id="f-emp"></div>
      </div>
      <div id="f-parttime" style="display:none">
        <div class="field">
          <label>想定の週の労働時間<span class="req">必須</span></label>
          <select id="f-hours">
            <option value="">選択してください</option>
            <option>10時間未満</option>
            <option>10〜20時間</option>
            <option>20〜30時間</option>
            <option>30〜40時間</option>
            <option>40時間以上</option>
          </select>
        </div>
        <div class="field">
          <label>メインで働ける時間帯<span class="req">必須</span></label>
          <select id="f-timeslot">
            <option value="">選択してください</option>
            <option>午前（〜12時）</option>
            <option>日中（12〜17時）</option>
            <option>夕方〜夜（17時〜）</option>
            <option>終日OK</option>
            <option>応相談</option>
          </select>
        </div>
      </div>
    </div>

    <div class="section">
      <h4>面接の候補日時（3つ入力してください）</h4>
      <div class="field">
        <label>第1希望<span class="req">必須</span></label>
        <div class="dt-row"><input type="date" id="f-d1"><input type="time" id="f-t1" step="900"></div>
      </div>
      <div class="field">
        <label>第2希望<span class="req">必須</span></label>
        <div class="dt-row"><input type="date" id="f-d2"><input type="time" id="f-t2" step="900"></div>
      </div>
      <div class="field">
        <label>第3希望<span class="req">必須</span></label>
        <div class="dt-row"><input type="date" id="f-d3"><input type="time" id="f-t3" step="900"></div>
      </div>
    </div>

    <div class="section">
      <h4>書類（職務経歴書のみ後から送付でもOK）</h4>
      <div class="field">
        <label>履歴書（PDF/画像/Word・10MBまで）<span class="req">必須</span></label>
        <label class="filebox" id="box-resume">タップしてファイルを選択
          <input type="file" id="f-resume" accept=".pdf,.jpg,.jpeg,.png,.doc,.docx">
        </label>
      </div>
      <div class="field">
        <label>職務経歴書（PDF/画像/Word・10MBまで）</label>
        <label class="filebox" id="box-career">タップしてファイルを選択
          <input type="file" id="f-career" accept=".pdf,.jpg,.jpeg,.png,.doc,.docx">
        </label>
      </div>
      <div class="field">
        <label>ご質問・伝えたいこと</label>
        <textarea id="f-note" maxlength="800" placeholder="任意"></textarea>
      </div>
    </div>

    <div class="notice">
      <b>面接について</b>
      <span id="interview-note"></span>
    </div>

    <div class="err" id="form-err"></div>
    <button class="pill primary" id="btn-submit" onclick="submitForm()">この内容で応募する</button>
  </div>
</div>

<!-- 画面4: 完了 -->
<div class="screen" id="scr-done">
  <div class="done-wrap">
    <div class="done-mark">✓</div>
    <h2>応募を受け付けました</h2>
    <p id="done-msg">確認メッセージをこのLINEにお送りしました。<br>担当者が内容を確認し、面接日時をご連絡します。</p>
    <button class="pill" onclick="liffClose()">閉じる</button>
  </div>
</div>

<div class="loading" id="loading"><div class="spinner"></div><p>送信しています…</p></div>

<script>
"use strict";
let DATA = null;          // jobs.json
let currentJob = null;    // 選択中の職種
let liffReady = false;
const $ = (id) => document.getElementById(id);

function show(id) {
  document.querySelectorAll(".screen").forEach(s => s.classList.remove("active"));
  $(id).classList.add("active");
  window.scrollTo(0, 0);
}

function esc(s) {
  return String(s == null ? "" : s).replace(/[&<>"']/g, c =>
    ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
}

// ---------- 画面1: 一覧 ----------
function renderList() {
  $("intro").textContent = DATA.common.intro;
  const c = DATA.common;
  $("conditions").innerHTML =
    `<h4>全職種共通の待遇・働き方</h4>
     <ul>${(c.conditions || []).map(x => `<li>${esc(x)}</li>`).join("")}</ul>`;
  $("company").innerHTML =
    `<summary>会社について（${esc(c.companyName)}）</summary>
     <div class="body"><dl>
       ${c.location ? `<dt>所在地</dt><dd>${esc(c.location)}</dd>` : ""}
       ${c.founded ? `<dt>設立</dt><dd>${esc(c.founded)}</dd>` : ""}
       ${c.employees ? `<dt>従業員数</dt><dd>${esc(c.employees)}</dd>` : ""}
     </dl></div>`;
  $("job-list").innerHTML = DATA.jobs.map((j, i) => {
    const sal = firstLine(j.salary);
    return `<div class="card" onclick="openDetail(${i})">
      <h3>${esc(j.title)}</h3>
      <div class="badges">
        ${(j.employmentTypes||[]).map(t => `<span class="badge">${esc(t)}</span>`).join("")}
        ${j.location ? `<span class="badge loc">${esc(j.location)}</span>` : ""}
      </div>
      ${sal ? `<div class="meta">${esc(sal)}</div>` : ""}
      <div class="cta-hint">詳しく見る ›</div>
    </div>`;
  }).join("");
}
function firstLine(s) {
  if (!s) return "";
  const l = s.split("\n").map(x => x.replace(/^・/, "").trim()).filter(Boolean);
  return l.slice(0, 2).join(" / ");
}

// ---------- 画面2: 詳細 ----------
const SECTIONS = [
  ["summary", "仕事概要"],
  ["requiredSkills", "必須スキル・経験"],
  ["welcomeSkills", "歓迎スキル・経験"],
  ["idealCandidate", "求める人物像"],
  ["salary", "給与"],
  ["location", "勤務地"],
  ["workStyle", "勤務体系"],
  ["probation", "試用期間"],
  ["benefits", "福利厚生"],
];
function openDetail(i) {
  currentJob = DATA.jobs[i];
  const j = currentJob;
  let html = `<div class="section">
    <h3 style="color:var(--main);font-size:17px;">${esc(j.title)}</h3>
    <div class="badges" style="margin-top:8px;">
      ${(j.employmentTypes||[]).map(t => `<span class="badge">${esc(t)}</span>`).join("")}
    </div>
  </div>`;
  for (const [key, label] of SECTIONS) {
    if (j[key]) html += `<div class="section"><h4>${esc(label)}</h4><div class="txt">${esc(j[key])}</div></div>`;
  }
  html += `<button class="pill primary" onclick="openForm()">この職種に応募する</button>`;
  $("detail-body").innerHTML = html;
  show("scr-detail");
}

// ---------- 画面3: フォーム ----------
function openForm() {
  const j = currentJob;
  $("form-job-title").textContent = "応募職種：" + j.title;
  $("interview-note").textContent = DATA.common.interviewNote;
  $("f-emp").innerHTML = (j.employmentTypes||["正社員","アルバイト"]).map((t, i) =>
    `<label onclick="pickEmp(this)"><input type="radio" name="emp" value="${esc(t)}">${esc(t)}</label>`).join("");
  $("form-err").textContent = "";
  show("scr-form");
}
// アルバイト・業務委託のとき想定週労働時間/時間帯(契約書用)を表示
const PARTTIME_EMP = ["アルバイト", "業務委託"];
function pickEmp(lab) {
  document.querySelectorAll("#f-emp label").forEach(l => l.classList.remove("on"));
  lab.classList.add("on");
  lab.querySelector("input").checked = true;
  const v = lab.querySelector("input").value;
  $("f-parttime").style.display = PARTTIME_EMP.includes(v) ? "" : "none";
}

// ファイル選択表示
for (const [boxId, inputId] of [["box-resume","f-resume"],["box-career","f-career"]]) {
  document.addEventListener("DOMContentLoaded", () => {
    $(inputId).addEventListener("change", () => {
      const f = $(inputId).files[0];
      const box = $(boxId);
      if (f) {
        if (f.size > 10 * 1024 * 1024) {
          $(inputId).value = "";
          box.classList.remove("has");
          box.firstChild.textContent = "10MBを超えています。別のファイルを選択してください";
          return;
        }
        box.classList.add("has");
        box.firstChild.textContent = "✓ " + f.name;
      } else {
        box.classList.remove("has");
        box.firstChild.textContent = "タップしてファイルを選択";
      }
    });
  });
}

function fileToB64(input) {
  const f = input.files[0];
  if (!f) return Promise.resolve(null);
  return new Promise((res, rej) => {
    const r = new FileReader();
    r.onload = () => res({ name: f.name, mime: f.type || "application/octet-stream",
                           data: String(r.result).split(",")[1] });
    r.onerror = rej;
    r.readAsDataURL(f);
  });
}

function validate() {
  const errs = [];
  if (!$("f-name").value.trim()) errs.push("氏名を入力してください");
  if (!$("f-tel").value.trim()) errs.push("電話番号を入力してください");
  const email = $("f-email").value.trim();
  if (!email) errs.push("メールアドレスを入力してください");
  else if (!/^[\w.+-]+@[\w-]+\.[\w.-]+$/.test(email)) errs.push("メールアドレスの形式が正しくありません");
  if (!$("f-age").value.trim()) errs.push("年齢を入力してください");
  var empSel = document.querySelector('#f-emp input:checked');
  if (!empSel) errs.push("雇用形態を選択してください");
  else if (PARTTIME_EMP.includes(empSel.value)) {
    if (!$("f-hours").value) errs.push("想定の週の労働時間を選択してください");
    if (!$("f-timeslot").value) errs.push("メインで働ける時間帯を選択してください");
  }
  for (const [d, t, lbl] of [["f-d1","f-t1","第1希望"],["f-d2","f-t2","第2希望"],["f-d3","f-t3","第3希望"]]) {
    if (!$(d).value || !$(t).value) errs.push(`面接候補日時の${lbl}（日付と時刻）を入力してください`);
  }
  if (!$("f-resume").files[0]) errs.push("履歴書を添付してください");
  return errs;
}

async function submitForm() {
  const errBox = $("form-err");
  errBox.textContent = "";
  const errs = validate();
  if (errs.length) { errBox.textContent = errs.join("\n"); return; }

  $("btn-submit").disabled = true;
  $("loading").classList.add("show");
  try {
    let idToken = null;
    if (liffReady) idToken = liff.getIDToken();
    const debugKey = new URLSearchParams(location.search).get("debugKey");
    if (!idToken && !debugKey) throw new Error("LINEログイン情報を取得できません。LINEアプリから開き直してください。");

    const [resume, career] = await Promise.all([fileToB64($("f-resume")), fileToB64($("f-career"))]);
    const slots = [];
    for (const [d, t] of [["f-d1","f-t1"],["f-d2","f-t2"],["f-d3","f-t3"]]) {
      if ($(d).value && $(t).value) slots.push($(d).value + " " + $(t).value);
    }
    const body = {
      kind: "apply",
      idToken, debugKey,
      jobPathId: currentJob.pathId,
      jobTitle: currentJob.title,
      name: $("f-name").value.trim(),
      tel: $("f-tel").value.trim(),
      email: $("f-email").value.trim(),
      age: $("f-age").value.trim(),
      employment: document.querySelector('#f-emp input:checked').value,
      weeklyHours: $("f-hours").value || "",
      timeSlot: $("f-timeslot").value || "",
      slots,
      note: $("f-note").value.trim(),
      resume, career,
    };
    const res = await fetch(window.CONFIG.GAS_URL, {
      method: "POST",
      headers: { "Content-Type": "text/plain;charset=utf-8" },  // GASのCORSプリフライト回避
      body: JSON.stringify(body),
    });
    const out = await res.json();
    if (!out.ok) throw new Error(out.error || "送信に失敗しました");
    // 応募者本人からトークへ氏名を送信（チャット一覧に氏名付きで載せ、採用担当が個別対応しやすくする）
    // LINEアプリ内でトークから開いた場合のみ成功。失敗しても応募処理には影響させない。
    try {
      if (liffReady && liff.isInClient() && liff.sendMessages) {
        await liff.sendMessages([{ type: "text", text: "【応募】" + body.name + "（" + currentJob.title + "）" }]);
      }
    } catch (e) { console.warn("sendMessages failed", e); }
    show("scr-done");
  } catch (e) {
    errBox.textContent = "送信できませんでした：" + (e && e.message || e) +
      "\n通信環境をご確認のうえ、もう一度お試しください。";
  } finally {
    $("btn-submit").disabled = false;
    $("loading").classList.remove("show");
  }
}

function liffClose() {
  if (liffReady && liff.isInClient()) liff.closeWindow();
  else show("scr-list");
}

// ---------- 起動 ----------
async function boot() {
  const res = await fetch("./jobs.json");
  DATA = await res.json();
  renderList();
  try {
    await liff.init({ liffId: window.CONFIG.LIFF_ID });
    if (!liff.isLoggedIn()) liff.login({ redirectUri: location.href });
    liffReady = true;
  } catch (e) {
    // LINE外ブラウザ等。閲覧は可能、送信はdebugKeyがない限り不可
    console.warn("liff.init failed", e);
  }
}
document.addEventListener("DOMContentLoaded", boot);
</script>
</body>
